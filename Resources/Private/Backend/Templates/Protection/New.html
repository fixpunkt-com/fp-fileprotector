<f:layout name="Default" />

<f:section name="main">
    <h2>Zugriffsschutz für Ordner <span class="text-info">{folder.name}</span> erstellen</h2>


    <f:form action="create" object="Protection" objectName="protection">
        <f:form.hidden property="storage" value="{folder.storage.uid}" />
        <f:form.hidden property="folder" value="{folder.identifier}" />

        <f:render partial="Protection/FormFields" arguments="{_all}" />

        <div>
            <f:link.action action="list" class="btn btn-default">Verwerfen</f:link.action>
            <f:form.button type="submit" class="btn btn-success">Zugriffsschutz anlegen</f:form.button>
        </div>
    </f:form>
</f:section>
